
<!DOCTYPE html>
<html>

<head>
<title>AI Creator Tools</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

input{
padding:12px;
width:250px;
border-radius:5px;
border:none;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.card{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:10px;
width:80%;
margin-left:auto;
margin-right:auto;
}

.copy{
background:#3b82f6;
margin-top:10px;
}

</style>

</head>

<body>

<h1>🚀 AI Creator Tools</h1>

<input id="topic" placeholder="Enter topic">

<br>

<button onclick="generate()">Generate</button>

<div class="card">
<h2>🔥 Title</h2>
<p id="title"></p>
<button class="copy" onclick="copyText('title')">Copy</button>
</div>

<div class="card">
<h2>📝 Description</h2>
<p id="desc"></p>
<button class="copy" onclick="copyText('desc')">Copy</button>
</div>

<div class="card">
<h2>🏷 Tags</h2>
<p id="tags"></p>
<button class="copy" onclick="copyText('tags')">Copy</button>
</div>

<div class="card">
<h2>🎬 Video Idea</h2>
<p id="idea"></p>
<button class="copy" onclick="copyText('idea')">Copy</button>
</div>

<div class="card">
<h2>⚡ Hook</h2>
<p id="hook"></p>
<button class="copy" onclick="copyText('hook')">Copy</button>
</div>

<div class="card">
<h2>🖼 Thumbnail Text</h2>
<p id="thumbnail"></p>
<button class="copy" onclick="copyText('thumbnail')">Copy</button>
</div>

<div class="card">
<h2>📜 Script</h2>
<p id="script"></p>
<button class="copy" onclick="copyText('script')">Copy</button>
</div>

<script>

function generate(){

var topic = document.getElementById("topic").value;

if(topic==""){
alert("Please enter topic");
return;
}

var titles=[
"🔥 "+topic+" | Viral Video",
topic+" | Must Watch",
"Secrets of "+topic,
"Truth About "+topic
];

var title=titles[Math.floor(Math.random()*titles.length)];

var desc="In this video we explore "+topic+". This topic is trending and many people want to know about it.";

var tags=topic+", "+topic+" video, "+topic+" youtube, viral video, trending video";

var idea="Create an engaging video explaining facts about "+topic;

var hook="You won't believe this about "+topic+"!";

var thumbnail=topic+" SHOCKING FACTS";

var script="Hello everyone! Today we are talking about "+topic+". This topic is very interesting.";

document.getElementById("title").innerText=title;
document.getElementById("desc").innerText=desc;
document.getElementById("tags").innerText=tags;
document.getElementById("idea").innerText=idea;
document.getElementById("hook").innerText=hook;
document.getElementById("thumbnail").innerText=thumbnail;
document.getElementById("script").innerText=script;

}

function copyText(id){

var text=document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

alert("Copied!");
}

</script>

</body>
</html>
